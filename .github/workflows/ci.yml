name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore tests/WarehouseManagementService.Tests/WarehouseManagementService.Tests.csproj

      - name: Build
        run: dotnet build tests/WarehouseManagementService.Tests/WarehouseManagementService.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/WarehouseManagementService.Tests/WarehouseManagementService.Tests.csproj --configuration Release --no-build --verbosity normal
